<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQI Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #e2e8f0;
  padding: 16px;
  min-height: 100px;
}
.card {
  background: rgba(30, 41, 59, 0.8);
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 20px;
  max-width: 360px;
}
.location {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.aqi-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}
.aqi-badge {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 28px;
  font-weight: 700;
  color: white;
}
.aqi-info { flex: 1; }
.aqi-level {
  font-size: 16px;
  font-weight: 600;
  color: #e2e8f0;
  margin-bottom: 4px;
}
.aqi-label {
  font-size: 12px;
  color: #94a3b8;
}
.pollutants {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}
.pollutant {
  display: flex;
  align-items: center;
  gap: 12px;
}
.pollutant-name {
  font-size: 12px;
  color: #94a3b8;
  width: 50px;
}
.bar-bg {
  flex: 1;
  height: 20px;
  background: #1e293b;
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}
.pollutant-value {
  font-size: 12px;
  font-weight: 600;
  color: #e2e8f0;
  width: 70px;
  text-align: right;
}
.advice {
  font-size: 13px;
  color: #94a3b8;
  padding: 12px;
  background: rgba(15, 23, 42, 0.5);
  border-radius: 8px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
</style>
</head>
<body>
<div class="card" id="aqi-card">
  <div class="location">🌬️ <span id="location">Loading...</span></div>
  <div class="aqi-row">
    <div class="aqi-badge" id="aqi-badge">--</div>
    <div class="aqi-info">
      <div class="aqi-level" id="aqi-level">Loading...</div>
      <div class="aqi-label">Air Quality Index</div>
    </div>
  </div>
  <div class="pollutants" id="pollutants"></div>
  <div class="advice" id="advice">💡 Loading...</div>
</div>

<script>
// ── MCP Apps PostMessage Protocol ──────────────────────────
const PROTOCOL_VERSION = "2026-01-26";
let requestId = 0;

function sendToHost(message) {
  window.parent.postMessage(message, "*");
}

function sendRequest(method, params) {
  requestId++;
  sendToHost({
    jsonrpc: "2.0",
    id: requestId,
    method: method,
    params: params,
  });
}

function sendNotification(method, params) {
  sendToHost({
    jsonrpc: "2.0",
    method: method,
    params: params,
  });
}

function getBarColor(val, good, moderate) {
  if (!val || val <= good) return "#4ade80";
  if (val <= moderate) return "#facc15";
  return "#f87171";
}

function getAQIColor(aqi) {
  if (aqi <= 50) return "#4ade80";
  if (aqi <= 100) return "#facc15";
  if (aqi <= 150) return "#fb923c";
  if (aqi <= 200) return "#f87171";
  if (aqi <= 300) return "#c084fc";
  return "#dc2626";
}

function renderAQI(data) {
  document.getElementById("location").textContent = data.location || "Unknown";
  document.getElementById("aqi-badge").textContent = data.aqi || "--";
  document.getElementById("aqi-badge").style.background = getAQIColor(data.aqi);
  document.getElementById("aqi-level").textContent = data.level || "";
  document.getElementById("advice").innerHTML = "💡 " + (data.healthAdvice || "");

  const pollutants = document.getElementById("pollutants");
  pollutants.innerHTML = "";

  const items = [
    { name: "PM2.5", value: data.pollutants?.pm25?.value, good: 25, moderate: 50, unit: "µg/m³" },
    { name: "PM10", value: data.pollutants?.pm10?.value, good: 50, moderate: 100, unit: "µg/m³" },
    { name: "O₃", value: data.pollutants?.ozone?.value, good: 100, moderate: 180, unit: "µg/m³" },
    { name: "NO₂", value: data.pollutants?.no2?.value, good: 40, moderate: 80, unit: "µg/m³" },
  ];

  items.forEach(function(item) {
    const val = item.value || 0;
    const max = item.moderate * 1.5;
    const pct = Math.min((val / max) * 100, 100);
    const color = getBarColor(val, item.good, item.moderate);

    const div = document.createElement("div");
    div.className = "pollutant";
    div.innerHTML =
      '<span class="pollutant-name">' + item.name + '</span>' +
      '<div class="bar-bg"><div class="bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '<span class="pollutant-value">' + val + ' ' + item.unit + '</span>';
    pollutants.appendChild(div);
  });
}

// Listen for messages from host
window.addEventListener("message", function(event) {
  const msg = event.data;
  if (!msg || msg.jsonrpc !== "2.0") return;

  if (msg.id && msg.result && msg.result.protocolVersion) {
    console.log("MCP Apps initialized with host v" + msg.result.protocolVersion);
    return;
  }

  if (msg.method === "ui/notifications/tool-result" && msg.params) {
    const result = msg.params.result || msg.params;
    if (result.content) {
      const textBlock = result.content.find(function(c) { return c.type === "text"; });
      if (textBlock) {
        try {
          const data = JSON.parse(textBlock.text);
          if (data.type === "aqi") {
            renderAQI(data);
          }
        } catch (e) {
          console.error("Failed to parse tool result:", e);
        }
      }
    }
    return;
  }
});

// Initialize MCP Apps connection
sendRequest("ui/initialize", {
  appInfo: { name: "AQI Card", version: "1.0.0" },
  appCapabilities: {},
  protocolVersion: PROTOCOL_VERSION,
});

sendNotification("ui/notifications/initialized", {});
</script>
</body>
</html>
