<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forecast Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #e2e8f0;
  padding: 16px;
  min-height: 100px;
}
.card {
  background: rgba(30, 41, 59, 0.8);
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 20px;
  max-width: 360px;
}
.header {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.days {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.day {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid #334155;
}
.day:last-child { border-bottom: none; }
.day-name {
  font-size: 14px;
  font-weight: 600;
  width: 60px;
  color: #e2e8f0;
}
.day-icon {
  font-size: 20px;
  width: 30px;
  text-align: center;
}
.day-temps {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.temp-high {
  font-size: 16px;
  font-weight: 600;
  color: #f87171;
}
.temp-low {
  font-size: 16px;
  color: #38bdf8;
}
.day-rain {
  font-size: 12px;
  color: #94a3b8;
  display: flex;
  align-items: center;
  gap: 4px;
}
</style>
</head>
<body>
<div class="card" id="forecast-card">
  <div class="header">📅 <span id="location">Loading...</span></div>
  <div class="days" id="days"></div>
</div>

<script>
function getWeatherIcon(condition) {
  if (!condition) return '🌤️';
  const c = condition.toLowerCase();
  if (c.includes('clear') || c.includes('sun')) return '☀️';
  if (c.includes('partly')) return '⛅';
  if (c.includes('cloud') || c.includes('overcast')) return '☁️';
  if (c.includes('rain') || c.includes('drizzle') || c.includes('shower')) return '🌧️';
  if (c.includes('thunder')) return '⛈️';
  if (c.includes('snow')) return '🌨️';
  if (c.includes('fog')) return '🌫️';
  return '🌤️';
}

window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'mcp-data') {
    const data = event.data.payload;
    document.getElementById('location').textContent = (data.location || 'Unknown') + ' — Forecast';

    const days = document.getElementById('days');
    days.innerHTML = '';

    (data.days || []).slice(0, 7).forEach(day => {
      const date = new Date(day.date).toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric' });
      const icon = getWeatherIcon(day.condition);

      const div = document.createElement('div');
      div.className = 'day';
      div.innerHTML = `
        <span class="day-name">${date}</span>
        <span class="day-icon">${icon}</span>
        <div class="day-temps">
          <span class="temp-high">${day.tempMax || '--'}°</span>
          <span class="temp-low">${day.tempMin || '--'}°</span>
        </div>
        <span class="day-rain">🌧️ ${day.precipitation || '0'}mm</span>
      `;
      days.appendChild(div);
    });
  }
});

if (window.parent !== window) {
  window.parent.postMessage({ type: 'mcp-request', tool: 'get_forecast' }, '*');
}
</script>
</body>
</html>
