<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forecast Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #e2e8f0;
  padding: 16px;
  min-height: 100px;
}
.card {
  background: rgba(30, 41, 59, 0.8);
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 20px;
  max-width: 360px;
}
.location {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.day {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #334155;
}
.day:last-child { border-bottom: none; }
.day-date {
  font-size: 14px;
  font-weight: 600;
  width: 60px;
}
.day-icon { font-size: 20px; width: 30px; text-align: center; }
.day-temps {
  font-size: 14px;
  display: flex;
  gap: 8px;
}
.temp-high { color: #f87171; font-weight: 600; }
.temp-low { color: #60a5fa; }
.day-rain {
  font-size: 12px;
  color: #94a3b8;
  width: 60px;
  text-align: right;
}
</style>
</head>
<body>
<div class="card" id="forecast-card">
  <div class="location">📅 <span id="location">Loading...</span> — <span id="days-count">7</span>-Day Forecast</div>
  <div id="forecast-days"></div>
</div>

<script>
// ── MCP Apps PostMessage Protocol ──────────────────────────
const PROTOCOL_VERSION = "2026-01-26";
let requestId = 0;

function sendToHost(message) {
  window.parent.postMessage(message, "*");
}

function sendRequest(method, params) {
  requestId++;
  sendToHost({
    jsonrpc: "2.0",
    id: requestId,
    method: method,
    params: params,
  });
}

function sendNotification(method, params) {
  sendToHost({
    jsonrpc: "2.0",
    method: method,
    params: params,
  });
}

function getWeatherIcon(condition) {
  if (!condition) return "🌤️";
  var c = condition.toLowerCase();
  if (c.includes("clear") || c.includes("sun")) return "☀️";
  if (c.includes("mainly clear")) return "🌤️";
  if (c.includes("partly")) return "⛅";
  if (c.includes("overcast") || c.includes("cloud")) return "☁️";
  if (c.includes("fog")) return "🌫️";
  if (c.includes("drizzle") || c.includes("rain") || c.includes("shower")) return "🌧️";
  if (c.includes("thunder")) return "⛈️";
  if (c.includes("snow")) return "🌨️";
  return "🌤️";
}

function renderForecast(data) {
  document.getElementById("location").textContent = data.location || "Unknown";
  document.getElementById("days-count").textContent = data.days ? data.days.length : 7;

  var container = document.getElementById("forecast-days");
  container.innerHTML = "";

  if (!data.days) return;

  data.days.forEach(function(day) {
    var date = new Date(day.date).toLocaleDateString("en-IN", {
      weekday: "short",
      day: "numeric",
    });
    var icon = getWeatherIcon(day.condition);
    var high = day.tempMax || "--";
    var low = day.tempMin || "--";
    var rain = day.precipitation || "--";

    var div = document.createElement("div");
    div.className = "day";
    div.innerHTML =
      '<span class="day-date">' + date + '</span>' +
      '<span class="day-icon">' + icon + '</span>' +
      '<span class="day-temps"><span class="temp-high">' + high + '°</span> / <span class="temp-low">' + low + '°</span></span>' +
      '<span class="day-rain">🌧️ ' + rain + 'mm</span>';
    container.appendChild(div);
  });
}

// Listen for messages from host
window.addEventListener("message", function(event) {
  var msg = event.data;
  if (!msg || msg.jsonrpc !== "2.0") return;

  if (msg.id && msg.result && msg.result.protocolVersion) {
    console.log("MCP Apps initialized with host v" + msg.result.protocolVersion);
    return;
  }

  if (msg.method === "ui/notifications/tool-result" && msg.params) {
    var result = msg.params.result || msg.params;
    if (result.content) {
      var textBlock = result.content.find(function(c) { return c.type === "text"; });
      if (textBlock) {
        try {
          var data = JSON.parse(textBlock.text);
          if (data.type === "forecast") {
            renderForecast(data);
          }
        } catch (e) {
          console.error("Failed to parse tool result:", e);
        }
      }
    }
    return;
  }
});

// Initialize MCP Apps connection
sendRequest("ui/initialize", {
  appInfo: { name: "Forecast Card", version: "1.0.0" },
  appCapabilities: {},
  protocolVersion: PROTOCOL_VERSION,
});

sendNotification("ui/notifications/initialized", {});
</script>
</body>
</html>
