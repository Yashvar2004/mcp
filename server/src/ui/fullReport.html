<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Weather Report</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #e2e8f0;
  padding: 16px;
  min-height: 100px;
}
.card {
  background: rgba(30, 41, 59, 0.8);
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 20px;
  max-width: 400px;
}
.header {
  margin-bottom: 20px;
}
.header-title {
  font-size: 18px;
  font-weight: 700;
  color: #e2e8f0;
  margin-bottom: 4px;
}
.header-location {
  font-size: 14px;
  color: #94a3b8;
}
.section {
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid #334155;
}
.section:last-child { border-bottom: none; }
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: #38bdf8;
  margin-bottom: 12px;
}
.weather-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.weather-item {
  display: flex;
  align-items: center;
  gap: 8px;
}
.weather-icon { font-size: 18px; }
.weather-label { font-size: 11px; color: #94a3b8; }
.weather-value { font-size: 14px; font-weight: 600; }
.forecast-days {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.forecast-day {
  display: flex;
  align-items: center;
  gap: 12px;
}
.forecast-date {
  font-size: 14px;
  font-weight: 600;
  width: 60px;
}
.forecast-icon { font-size: 18px; width: 30px; text-align: center; }
.forecast-temps { flex: 1; display: flex; gap: 8px; }
.forecast-high { color: #f87171; font-weight: 600; }
.forecast-low { color: #38bdf8; }
.forecast-rain { font-size: 12px; color: #94a3b8; }
.aqi-section {
  display: flex;
  align-items: center;
  gap: 16px;
}
.aqi-badge {
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 24px;
  font-weight: 700;
  color: white;
}
.aqi-info { flex: 1; }
.aqi-level { font-size: 14px; font-weight: 600; }
.aqi-details { font-size: 12px; color: #94a3b8; margin-top: 4px; }
</style>
</head>
<body>
<div class="card" id="report-card">
  <div class="header">
    <div class="header-title">🌤️ Complete Weather Report</div>
    <div class="header-location" id="location">Loading...</div>
  </div>

  <div class="section" id="weather-section" style="display:none">
    <div class="section-title">Current Weather</div>
    <div class="weather-grid" id="weather-grid"></div>
  </div>

  <div class="section" id="forecast-section" style="display:none">
    <div class="section-title">3-Day Forecast</div>
    <div class="forecast-days" id="forecast-days"></div>
  </div>

  <div class="section" id="aqi-section" style="display:none">
    <div class="section-title">Air Quality</div>
    <div class="aqi-section">
      <div class="aqi-badge" id="aqi-badge">--</div>
      <div class="aqi-info">
        <div class="aqi-level" id="aqi-level">--</div>
        <div class="aqi-details" id="aqi-details"></div>
      </div>
    </div>
  </div>
</div>

<script>
function getAQIColor(aqi) {
  if (aqi <= 50) return '#4ade80';
  if (aqi <= 100) return '#facc15';
  if (aqi <= 150) return '#fb923c';
  if (aqi <= 200) return '#f87171';
  if (aqi <= 300) return '#c084fc';
  return '#dc2626';
}

function getWeatherIcon(condition) {
  if (!condition) return '🌤️';
  const c = condition.toLowerCase();
  if (c.includes('clear') || c.includes('sun')) return '☀️';
  if (c.includes('partly')) return '⛅';
  if (c.includes('cloud') || c.includes('overcast')) return '☁️';
  if (c.includes('rain') || c.includes('drizzle') || c.includes('shower')) return '🌧️';
  if (c.includes('thunder')) return '⛈️';
  if (c.includes('snow')) return '🌨️';
  if (c.includes('fog')) return '🌫️';
  return '🌤️';
}

window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'mcp-data') {
    const data = event.data.payload;
    document.getElementById('location').textContent = '📍 ' + (data.location || 'Unknown');

    // Weather section
    if (data.weather) {
      document.getElementById('weather-section').style.display = 'block';
      const w = data.weather;
      const icon = getWeatherIcon(w.condition);
      document.getElementById('weather-grid').innerHTML = `
        <div class="weather-item"><span class="weather-icon">${icon}</span><div><div class="weather-label">Condition</div><div class="weather-value">${w.condition || '--'}</div></div></div>
        <div class="weather-item"><span class="weather-icon">🌡️</span><div><div class="weather-label">Temperature</div><div class="weather-value">${w.temperature || '--'}°C</div></div></div>
        <div class="weather-item"><span class="weather-icon">💧</span><div><div class="weather-label">Humidity</div><div class="weather-value">${w.humidity || '--'}%</div></div></div>
        <div class="weather-item"><span class="weather-icon">💨</span><div><div class="weather-label">Wind</div><div class="weather-value">${w.windSpeed || '--'} km/h</div></div></div>
      `;
    }

    // Forecast section
    if (data.forecast && data.forecast.length > 0) {
      document.getElementById('forecast-section').style.display = 'block';
      const container = document.getElementById('forecast-days');
      container.innerHTML = '';
      data.forecast.slice(0, 3).forEach(day => {
        const date = new Date(day.date).toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric' });
        const div = document.createElement('div');
        div.className = 'forecast-day';
        div.innerHTML = `
          <span class="forecast-date">${date}</span>
          <span class="forecast-icon">🌤️</span>
          <div class="forecast-temps"><span class="forecast-high">${day.tempMax || '--'}°</span><span class="forecast-low">${day.tempMin || '--'}°</span></div>
          <span class="forecast-rain">🌧️ ${day.precipitation || '0'}mm</span>
        `;
        container.appendChild(div);
      });
    }

    // AQI section
    if (data.aqi) {
      document.getElementById('aqi-section').style.display = 'block';
      const aqi = data.aqi;
      document.getElementById('aqi-badge').textContent = aqi.value || '--';
      document.getElementById('aqi-badge').style.background = getAQIColor(aqi.value);
      document.getElementById('aqi-level').textContent = aqi.level || '';
      document.getElementById('aqi-details').textContent = `PM2.5: ${aqi.pm25 || '--'} | PM10: ${aqi.pm10 || '--'} | O₃: ${aqi.ozone || '--'}`;
    }
  }
});

if (window.parent !== window) {
  window.parent.postMessage({ type: 'mcp-request', tool: 'get_full_report' }, '*');
}
</script>
</body>
</html>
