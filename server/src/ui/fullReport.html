<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Report Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #e2e8f0;
  padding: 16px;
  min-height: 100px;
}
.card {
  background: rgba(30, 41, 59, 0.8);
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 20px;
  max-width: 400px;
}
.header {
  font-size: 18px;
  font-weight: 700;
  color: #38bdf8;
  margin-bottom: 4px;
}
.location {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 16px;
}
.section {
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid #334155;
}
.section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: #94a3b8;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.weather-main {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 8px;
}
.weather-temp {
  font-size: 36px;
  font-weight: 700;
  color: #f87171;
}
.weather-feels {
  font-size: 13px;
  color: #94a3b8;
}
.weather-condition {
  font-size: 14px;
  margin-bottom: 10px;
}
.weather-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.stat {
  font-size: 12px;
  color: #94a3b8;
}
.stat span { color: #e2e8f0; font-weight: 600; }
.forecast-day {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
}
.forecast-date {
  font-size: 13px;
  font-weight: 600;
  width: 60px;
}
.forecast-temps {
  font-size: 13px;
}
.forecast-temps .high { color: #f87171; }
.forecast-temps .low { color: #60a5fa; }
.forecast-rain {
  font-size: 12px;
  color: #94a3b8;
}
.aqi-badge {
  display: inline-block;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 22px;
  font-weight: 700;
  color: white;
  margin-right: 12px;
}
.aqi-info { display: inline-block; vertical-align: middle; }
.aqi-level { font-size: 14px; font-weight: 600; }
.aqi-detail {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 8px;
}
</style>
</head>
<body>
<div class="card" id="fullreport-card">
  <div class="header">Complete Weather Report</div>
  <div class="location" id="location">Loading...</div>

  <div class="section" id="weather-section" style="display:none">
    <div class="section-title">Current Weather</div>
    <div class="weather-main">
      <div class="weather-temp" id="temp">--C</div>
      <div class="weather-feels">Feels like <span id="feels">--C</span></div>
    </div>
    <div class="weather-condition" id="condition"></div>
    <div class="weather-stats">
      <div class="stat">Humidity: <span id="humidity">--%</span></div>
      <div class="stat">Wind: <span id="wind">-- km/h</span></div>
      <div class="stat">UV: <span id="uv">--</span></div>
      <div class="stat">Pressure: <span id="pressure">-- hPa</span></div>
    </div>
  </div>

  <div class="section" id="forecast-section" style="display:none">
    <div class="section-title">3-Day Forecast</div>
    <div id="forecast-days"></div>
  </div>

  <div class="section" id="aqi-section" style="display:none">
    <div class="section-title">Air Quality</div>
    <div>
      <span class="aqi-badge" id="aqi-badge">--</span>
      <div class="aqi-info">
        <div class="aqi-level" id="aqi-level"></div>
      </div>
    </div>
    <div class="aqi-detail" id="aqi-detail"></div>
  </div>
</div>

<script>
var PROTOCOL_VERSION = "2026-01-26";
var requestId = 0;

function sendToHost(message) {
  window.parent.postMessage(message, "*");
}

function sendRequest(method, params) {
  requestId++;
  sendToHost({
    jsonrpc: "2.0",
    id: requestId,
    method: method,
    params: params,
  });
}

function sendNotification(method, params) {
  sendToHost({
    jsonrpc: "2.0",
    method: method,
    params: params,
  });
}

function getAQIColor(aqi) {
  if (aqi <= 50) return "#4ade80";
  if (aqi <= 100) return "#facc15";
  if (aqi <= 150) return "#fb923c";
  if (aqi <= 200) return "#f87171";
  if (aqi <= 300) return "#c084fc";
  return "#dc2626";
}

function renderFullReport(data) {
  document.getElementById("location").textContent = data.location || "Unknown";

  if (data.weather) {
    document.getElementById("weather-section").style.display = "block";
    var w = data.weather;
    document.getElementById("temp").textContent = (w.temperature || "--") + "C";
    document.getElementById("feels").textContent = (w.feelsLike || "--") + "C";
    document.getElementById("condition").textContent = w.condition || "";
    document.getElementById("humidity").textContent = (w.humidity || "--") + "%";
    document.getElementById("wind").textContent = (w.windSpeed || "--") + " km/h";
    document.getElementById("uv").textContent = w.uvIndex || "--";
    document.getElementById("pressure").textContent = (w.pressure || "--") + " hPa";
  }

  if (data.forecast && data.forecast.length > 0) {
    document.getElementById("forecast-section").style.display = "block";
    var container = document.getElementById("forecast-days");
    container.innerHTML = "";

    data.forecast.forEach(function(day) {
      var date = new Date(day.date).toLocaleDateString("en-IN", { weekday: "short", day: "numeric" });
      var div = document.createElement("div");
      div.className = "forecast-day";
      div.innerHTML =
        '<span class="forecast-date">' + date + '</span>' +
        '<span class="forecast-temps"><span class="high">' + (day.tempMax || "--") + 'C</span> / <span class="low">' + (day.tempMin || "--") + 'C</span></span>' +
        '<span class="forecast-rain">' + (day.precipitation || "--") + 'mm</span>';
      container.appendChild(div);
    });
  }

  if (data.aqi) {
    document.getElementById("aqi-section").style.display = "block";
    document.getElementById("aqi-badge").textContent = data.aqi.value || "--";
    document.getElementById("aqi-badge").style.background = getAQIColor(data.aqi.value);
    document.getElementById("aqi-level").textContent = data.aqi.level || "";

    var details = [];
    if (data.aqi.pm25 !== undefined) details.push("PM2.5: " + data.aqi.pm25);
    if (data.aqi.pm10 !== undefined) details.push("PM10: " + data.aqi.pm10);
    if (data.aqi.ozone !== undefined) details.push("O3: " + data.aqi.ozone);
    document.getElementById("aqi-detail").textContent = details.join(" | ");
  }
}

window.addEventListener("message", function(event) {
  var msg = event.data;
  if (!msg || msg.jsonrpc !== "2.0") return;

  if (msg.id && msg.result && msg.result.protocolVersion) {
    console.log("MCP Apps initialized with host v" + msg.result.protocolVersion);
    return;
  }

  if (msg.method === "ui/notifications/tool-result" && msg.params) {
    var result = msg.params.result || msg.params;
    if (result.content) {
      var textBlock = result.content.find(function(c) { return c.type === "text"; });
      if (textBlock) {
        try {
          var data = JSON.parse(textBlock.text);
          if (data.type === "fullReport") {
            renderFullReport(data);
          }
        } catch (e) {
          console.error("Failed to parse tool result:", e);
        }
      }
    }
    return;
  }
});

sendRequest("ui/initialize", {
  appInfo: { name: "Full Report Card", version: "1.0.0" },
  appCapabilities: {},
  protocolVersion: PROTOCOL_VERSION,
});

sendNotification("ui/notifications/initialized", {});
</script>
</body>
</html>
