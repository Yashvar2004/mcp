<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Widget</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #e2e8f0;
  padding: 16px;
  min-height: 100px;
}
.card {
  background: rgba(30, 41, 59, 0.8);
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 20px;
  max-width: 360px;
}
.location {
  font-size: 14px;
  color: #38bdf8;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.temp-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 4px;
}
.temp {
  font-size: 48px;
  font-weight: 700;
  color: #f87171;
}
.feels {
  font-size: 14px;
  color: #94a3b8;
}
.condition {
  font-size: 16px;
  color: #e2e8f0;
  margin-bottom: 16px;
}
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.stat {
  display: flex;
  align-items: center;
  gap: 8px;
}
.stat-icon {
  font-size: 18px;
}
.stat-label {
  font-size: 11px;
  color: #94a3b8;
  text-transform: uppercase;
}
.stat-value {
  font-size: 14px;
  font-weight: 600;
  color: #e2e8f0;
}
</style>
</head>
<body>
<div class="card" id="weather-card">
  <div class="location">📍 <span id="location">Loading...</span></div>
  <div class="temp-row">
    <div class="temp" id="temp">--°C</div>
    <div class="feels">Feels like <span id="feels">--°C</span></div>
  </div>
  <div class="condition" id="condition">Loading...</div>
  <div class="stats">
    <div class="stat">
      <span class="stat-icon">💧</span>
      <div>
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity">--%</div>
      </div>
    </div>
    <div class="stat">
      <span class="stat-icon">💨</span>
      <div>
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="wind">-- km/h</div>
      </div>
    </div>
    <div class="stat">
      <span class="stat-icon">🌧️</span>
      <div>
        <div class="stat-label">Rain</div>
        <div class="stat-value" id="rain">-- mm</div>
      </div>
    </div>
    <div class="stat">
      <span class="stat-icon">☀️</span>
      <div>
        <div class="stat-label">UV Index</div>
        <div class="stat-value" id="uv">--</div>
      </div>
    </div>
  </div>
</div>

<script>
// Listen for data from MCP host via postMessage
window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'mcp-data') {
    const data = event.data.payload;
    document.getElementById('location').textContent = data.location || 'Unknown';
    document.getElementById('temp').textContent = (data.temperature || '--') + '°C';
    document.getElementById('feels').textContent = (data.feelsLike || '--') + '°C';
    document.getElementById('condition').textContent = data.condition || '';
    document.getElementById('humidity').textContent = (data.humidity || '--') + '%';
    document.getElementById('wind').textContent = (data.windSpeed || '--') + ' km/h';
    document.getElementById('rain').textContent = (data.precipitation || '0') + ' mm';
    document.getElementById('uv').textContent = data.uvIndex || '--';
  }
});

// Request data from parent
if (window.parent !== window) {
  window.parent.postMessage({ type: 'mcp-request', tool: 'search_weather' }, '*');
}
</script>
</body>
</html>
